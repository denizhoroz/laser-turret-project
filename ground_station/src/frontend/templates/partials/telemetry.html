<section aria-label="Telemetry" class="bg-zinc-950 border border-zinc-800 p-4 flex-1">
  <h2 class="text-xs uppercase tracking-wider text-zinc-500 mb-3">Telemetry</h2>

  <div class="grid grid-cols-4 gap-2 text-sm" id="telemetry-grid">
    {% for i in range(4) %}
    <div class="flex flex-col items-center px-2 py-2 bg-black border border-zinc-800" data-sw="{{ i }}">
      <span class="text-[10px] text-zinc-500">SW{{ i + 1 }}</span>
      <span class="w-2 h-2 bg-zinc-700 mt-1" data-led></span>
    </div>
    {% endfor %}

    <div class="flex flex-col items-center px-2 py-2 bg-black border border-zinc-800">
      <span class="text-[10px] text-zinc-500">YAW</span>
      <span id="t-yaw" class="font-mono text-zinc-200 mt-1">—</span>
    </div>

    <div class="flex flex-col items-center px-2 py-2 bg-black border border-zinc-800">
      <span class="text-[10px] text-zinc-500">PITCH</span>
      <span id="t-pitch" class="font-mono text-zinc-200 mt-1">—</span>
    </div>

    <div class="flex flex-col items-center px-2 py-2 bg-black border border-zinc-800">
      <span class="text-[10px] text-zinc-500">LASER</span>
      <span id="t-laser-dot" class="w-2 h-2 bg-zinc-700 mt-1"></span>
    </div>

    <div class="flex flex-col items-center px-2 py-2 bg-black border border-zinc-800">
      <span class="text-[10px] text-zinc-500">STATE</span>
      <span id="t-state" class="font-medium text-zinc-200 mt-1">—</span>
    </div>
  </div>
</section>
