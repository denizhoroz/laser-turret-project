<section aria-label="Live video" class="relative bg-zinc-950 border border-zinc-800 overflow-hidden order-1 lg:order-2 aspect-[8/3] w-full">
  <img id="video" src="/video" alt="Live video stream" class="absolute inset-0 w-full h-full object-contain block" />
  <canvas id="overlay" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>
  <div id="video-fallback" class="absolute inset-0 hidden items-center justify-center text-zinc-600 text-sm">
    <span>No video signal</span>
  </div>
</section>
