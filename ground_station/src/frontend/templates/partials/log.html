<section aria-label="Log" class="mx-4 mb-4">
  <details class="bg-zinc-950 border border-zinc-800" open>
    <summary class="cursor-pointer px-4 py-2 text-xs uppercase tracking-wider text-zinc-500 flex items-center justify-between">
      <span>Log</span>
      <button id="btn-clear-log" type="button" class="text-[10px] text-zinc-500 hover:text-zinc-300 px-2 py-1">Clear</button>
    </summary>
    <ol id="log" class="px-4 pb-3 max-h-48 overflow-y-auto font-mono text-xs space-y-1" aria-live="polite"></ol>
  </details>
</section>
