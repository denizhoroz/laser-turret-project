<header class="flex items-center justify-between px-6 py-3 border-b border-zinc-800">
  <h1 class="text-base font-semibold tracking-wide text-zinc-100">Ground Station</h1>
  <div class="flex items-center gap-3">
    <span id="conn-pill" class="inline-flex items-center gap-2 px-3 py-1 text-xs font-medium border border-zinc-800 bg-zinc-950 text-zinc-500" aria-live="polite">
      <span id="conn-dot" class="w-2 h-2 bg-zinc-600"></span>
      <span id="conn-text">Disconnected</span>
    </span>
    <span id="status-pill" class="inline-flex items-center px-3 py-1 text-xs font-medium border border-zinc-800 bg-zinc-950 text-zinc-400">
      <span id="status-text">Offline</span>
    </span>
  </div>
</header>
